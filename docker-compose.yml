services:

  nginx:
    image: nginx:1.29
    ports:
      - "80:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    build:
      context: ./docker/php
      args:
        UID: ${UID}
        GID: ${GID}
    volumes:
      - ./src:/var/www
    environment:
      UID: ${UID}
      GID: ${GID}
      XDEBUG_MODE: debug
      XDEBUG_CONFIG: client_host=host.docker.internal
    expose:
      - "9000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  redis:
    image: redis:8.6

  db:
    image: mariadb:12.2
    restart: on-failure
    environment:
      MYSQL_DATABASE: slotapi
      MYSQL_USER: slotapi
      MYSQL_PASSWORD: slotapi
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql

volumes:
  dbdata: