# /etc/nginx/conf.d/default.conf

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;                    # localhost или твой домен

    # Путь к public-директории Laravel (volume должен быть смонтирован одинаково в оба контейнера)
    root /var/www/public;

    index index.php index.html;

    client_max_body_size 100m;        # для больших файлов/изображений

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    # ==================== ОСНОВНОЙ РОУТИНГ LARAVEL ====================
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ==================== PHP-FPM ====================
    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_pass php:9000;                    # ← имя сервиса в docker-compose.yml
        fastcgi_index index.php;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param PATH_TRANSLATED $document_root$fastcgi_path_info;

        include fastcgi_params;

        # Производительность
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 180s;
    }

    # ==================== СТАТИКА (кеширование) ====================
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff2?|ttf|eot|otf|webp)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # ==================== ЗАЩИТА ====================
    # Запрещаем доступ к чувствительным файлам
    #location ~* ^/(?:\.env|\.git|composer\.json|composer\.lock|package\.json|yarn\.lock|webpack\.mix\.js) {
    #    deny all;
    #}

    location ~ /\. {
        deny all;
    }

    # Не логируем favicon и robots.txt
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}